<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.22/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/fixedcolumns/3.3.2/css/fixedColumns.bootstrap4.min.css">
  <link rel="stylesheet" href="css/font-awesome.min.css">
  <link rel="stylesheet" type="text/css" href="css/index.css">
  <link rel="stylesheet" type="text/css" href="css/off_def_ranking.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script type="text/javascript" charset="utf8" src="https://code.jquery.com/jquery-3.5.1.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.10.22/js/jquery.dataTables.min.js"></script>
  <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/fixedcolumns/3.3.2/js/dataTables.fixedColumns.min.js"></script>
  <script type="text/javascript" charset="utf8" src="js/off_def_ranking.js"></script>
  <title>TrendsFC - Off/Def Ranking</title>
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>
  <script src="js/navbar.js"></script>

  <div class="container mt-5">
    <h1 class="mb-4">Offensive &amp; Defensive Ranking</h1>

    <div class="form-row align-items-end mb-3">
      <div class="col-md-6 col-12">
        <label for="yearSelect">Year:</label>
        <select id="yearSelect" class="form-control"></select>
      </div>
      <div class="col-md-6 col-12">
        <label for="monthSelect">Month:</label>
        <select id="monthSelect" class="form-control"></select>
      </div>
    </div>

    <div><i>Date of the latest match : <span id="latestDate"></span></i></div>

    <div class="mb-3 mt-2">
      <label><strong>Filter by confederation:</strong></label>
      <div id="confed-filters" class="form-check form-check-inline"></div>
    </div>

    <table class="table table-striped" id="offDefTable" style="width:100%">
      <thead class="thead-dark">
        <tr>
          <th>#</th>
          <th style="width:32px;"></th>
          <th>Team</th>
          <th>Off. Rank</th>
          <th class="d-none d-md-table-cell">Off. Pts</th>
          <th>Def. Rank</th>
          <th class="d-none d-md-table-cell">Def. Pts</th>
          <th class="d-none d-lg-table-cell">Confed.</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <button id="back-to-top" class="btn btn-secondary" style="position:fixed;bottom:30px;right:30px;display:none;z-index:999;">
    ↑ Top
  </button>

</body>
</html>
